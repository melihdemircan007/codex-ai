# Repo-scoped Codex configuration.
# Keep secrets outside the repo and provide them through environment variables.

[mcp_servers.atlassian]
url = "https://mcp-atlassian.turkcell.com.tr/mcp"
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.atlassian.http_headers]
# Do not store Jira personal tokens in repo files. Provide credentials through
# the runtime MCP configuration or environment variables outside the repository.
X-Atlassian-Jira-Url = "https://jira.turkcell.com.tr"
